# Cấu hình events cho nginx
events {
    worker_connections 1024;  # Số connection tối đa mỗi worker
}

http {
    # Include MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Server configuration
    server {
        listen 80;           # Lắng nghe port 80
        server_name localhost;  # Tên server
        
        # Root directory cho static files
        root /usr/share/nginx/html;
        index index.html;    # File index mặc định
        
        # Handle React Router - SPA routing
        # Tất cả request không phải file sẽ được redirect về index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        # API proxy đến backend
        # Chuyển request có prefix /api/ đến server Spring Boot
        location /api/ {
            proxy_pass http://backend:8083/;  # Backend service name trong Docker Compose
            proxy_set_header Host $host;              # Forward host header
            proxy_set_header X-Real-IP $remote_addr;   # Forward real IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Forward IP chain
            proxy_set_header X-Forwarded-Proto $scheme;  # Forward protocol
        }
        
        # Cache static assets để tăng performance
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;  # Cache trong 1 năm
            add_header Cache-Control "public, immutable";
        }
    }
}
